name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# One run per ref; newer pushes cancel superseded in-progress runs.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: Backend · pytest (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 3.12 matches the production Dockerfile; 3.11 is the pyproject floor.
        python-version: ["3.11", "3.12"]
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install (with test extras)
        run: |
          python -m pip install --upgrade pip
          pip install ".[test]"

      - name: Run tests
        # The LLM eval (RUN_LLM_EVAL) stays opt-in and needs Cursor creds, so it
        # is not run here. Conftest points every path at temp SQLite + a test
        # admin password, so no secrets are required for the deterministic suite.
        run: pytest -q

  frontend:
    name: Frontend · typecheck + vitest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npm test

  docker:
    name: Docker · build images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      # Validates the production Dockerfiles build. The frontend build here also
      # exercises `next build` (with the same heap bump the Dockerfile uses).
      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
