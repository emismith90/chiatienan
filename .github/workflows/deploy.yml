name: Deploy

# Continuous deployment to the DigitalOcean droplet.
#
# Model: images are BUILT ON GITHUB and pushed to GHCR; the droplet only
# PULLS them (docker compose pull && up -d). No `--build` on the droplet, so
# the 512 MB host never runs `next build` and cannot OOM during a deploy.
#
# Runs on merges to main and on manual dispatch. The deploy job stays a no-op
# until the SSH secrets are configured, so merging never breaks the repo.
# Configure under Settings → Secrets and variables → Actions:
#
#   Secrets (required for deploy):
#     DEPLOY_SSH_KEY   – private SSH key authorized on the droplet
#     DEPLOY_HOST      – droplet hostname or IP
#   Secrets (required to (re)generate .env from GitHub; if unset the deploy
#   keeps the existing .env on the droplet untouched):
#     CURSOR_API_KEY   – Cursor SDK key (crsr_…)
#     ADMIN_PASSWORD   – admin password guarding POST /api/rooms etc.
#   Secrets (optional):
#     DEPLOY_USER      – SSH user (defaults to "root")
#   Variables (all optional except CADDY_DOMAIN; each falls back to its
#   .env.example default when unset):
#     CADDY_DOMAIN             – your domain (REQUIRED when .env is regenerated; Caddy TLS)
#     DEPLOY_PATH              – checkout dir on the droplet (default /opt/chiatienan)
#     CURSOR_SDK_MODEL         – default "grok-4.5-fast"
#     CURSOR_SDK_WORKSPACE     – default "/data/cursor-agent" (keep it under the
#                                mounted /data volume so it persists across restarts)
#     CURSOR_API_BASE          – default "https://api.cursor.com"
#     CURSOR_AGENT_MAX_TOOLS   – default "40"
#     CURSOR_AGENT_MAX_SECONDS – default "120"
#     BOT_HANDLE               – default "bot"
#     DATABASE_URL             – default "sqlite:////data/chiatienan.db" (keep it
#                                under /data so the SQLite file persists)
#     TZ                       – default "Asia/Ho_Chi_Minh"
#     QR_BASE_URL              – default "https://img.vietqr.io/image"
#     QR_TEMPLATE              – default "compact2"
#
# GHCR auth uses the run's built-in GITHUB_TOKEN (packages: write to push,
# packages: read on the droplet to pull) — no personal access token needed,
# and the packages stay private.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read

env:
  IMAGE_BASE: ghcr.io/${{ github.repository_owner }}/chiatienan

jobs:
  build:
    name: Build & push images (GHCR)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}-backend:latest
            ${{ env.IMAGE_BASE }}-backend:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}-frontend:latest
            ${{ env.IMAGE_BASE }}-frontend:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  deploy:
    name: Deploy to droplet
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Check configuration
        id: check
        env:
          KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          HOST: ${{ secrets.DEPLOY_HOST }}
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: |
          if [ -z "$KEY" ] || [ -z "$HOST" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::DEPLOY_SSH_KEY / DEPLOY_HOST not set — skipping deploy. See deploy.yml header."
            exit 0
          fi
          echo "configured=true" >> "$GITHUB_OUTPUT"
          if [ -n "$CURSOR_API_KEY" ] && [ -n "$ADMIN_PASSWORD" ]; then
            echo "provision_env=true" >> "$GITHUB_OUTPUT"
          else
            echo "provision_env=false" >> "$GITHUB_OUTPUT"
            echo "::notice::CURSOR_API_KEY/ADMIN_PASSWORD not set — keeping the existing .env on the droplet."
          fi

      - name: Set up SSH
        if: steps.check.outputs.configured == 'true'
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Provision .env from secrets
        if: steps.check.outputs.configured == 'true' && steps.check.outputs.provision_env == 'true'
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER || 'root' }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH || '/opt/chiatienan' }}
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          CADDY_DOMAIN: ${{ vars.CADDY_DOMAIN }}
          CURSOR_SDK_MODEL: ${{ vars.CURSOR_SDK_MODEL || 'grok-4.5-fast' }}
          CURSOR_SDK_WORKSPACE: ${{ vars.CURSOR_SDK_WORKSPACE || '/data/cursor-agent' }}
          CURSOR_API_BASE: ${{ vars.CURSOR_API_BASE || 'https://api.cursor.com' }}
          CURSOR_AGENT_MAX_TOOLS: ${{ vars.CURSOR_AGENT_MAX_TOOLS || '40' }}
          CURSOR_AGENT_MAX_SECONDS: ${{ vars.CURSOR_AGENT_MAX_SECONDS || '120' }}
          BOT_HANDLE: ${{ vars.BOT_HANDLE || 'bot' }}
          DATABASE_URL: ${{ vars.DATABASE_URL || 'sqlite:////data/chiatienan.db' }}
          # Sourced from the repo `TZ` variable; kept as APP_TZ on the runner so
          # it can't shift the runner's own clock/timestamps.
          APP_TZ: ${{ vars.TZ || 'Asia/Ho_Chi_Minh' }}
          QR_BASE_URL: ${{ vars.QR_BASE_URL || 'https://img.vietqr.io/image' }}
          QR_TEMPLATE: ${{ vars.QR_TEMPLATE || 'compact2' }}
        run: |
          set -euo pipefail
          if [ -z "${CADDY_DOMAIN}" ]; then
            echo "::error::CADDY_DOMAIN variable is required to (re)generate .env (Caddy needs it for TLS)."
            exit 1
          fi
          umask 077
          # Mirrors .env.example. Secrets + commonly-tuned values come from
          # GitHub; the rest are stable defaults. The unquoted heredoc expands
          # the ${VARS} once, writing their literal values.
          cat > env.generated <<EOF
          # Managed by .github/workflows/deploy.yml — edits here are overwritten on deploy.
          CURSOR_API_KEY=${CURSOR_API_KEY}
          CURSOR_SDK_MODEL=${CURSOR_SDK_MODEL}
          CURSOR_SDK_WORKSPACE=${CURSOR_SDK_WORKSPACE}
          CURSOR_API_BASE=${CURSOR_API_BASE}
          CURSOR_AGENT_MAX_TOOLS=${CURSOR_AGENT_MAX_TOOLS}
          CURSOR_AGENT_MAX_SECONDS=${CURSOR_AGENT_MAX_SECONDS}
          BOT_HANDLE=${BOT_HANDLE}
          DATABASE_URL=${DATABASE_URL}
          TZ=${APP_TZ}
          ADMIN_PASSWORD=${ADMIN_PASSWORD}
          QR_BASE_URL=${QR_BASE_URL}
          QR_TEMPLATE=${QR_TEMPLATE}
          CADDY_DOMAIN=${CADDY_DOMAIN}
          EOF
          # Install atomically on the droplet, backing up the previous .env.
          # The generated file is piped over ssh stdin (never on the argv).
          ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=yes "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "cd '${DEPLOY_PATH}' && { [ -f .env ] && cp -a .env \".env.bak.\$(date +%Y%m%d%H%M%S)\" || true; } && cat > .env.new && install -m 600 .env.new .env && rm -f .env.new && echo '.env provisioned from GitHub secrets'" < env.generated
          rm -f env.generated

      - name: Deploy (pull prebuilt images)
        if: steps.check.outputs.configured == 'true'
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER || 'root' }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH || '/opt/chiatienan' }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail
          # Token is piped via ssh stdin into `docker login --password-stdin`,
          # so it never appears in the remote process arguments. git pull keeps
          # docker-compose.yml / Caddyfile current; IMAGE_TAG pins the exact
          # images this run built.
          echo "${GHCR_TOKEN}" | ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=yes \
            "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "set -e; cd '${DEPLOY_PATH}' && git pull --ff-only && \
             docker login ghcr.io -u '${GHCR_USER}' --password-stdin && \
             export IMAGE_TAG='${IMAGE_TAG}' && \
             docker compose pull && docker compose up -d && \
             { docker logout ghcr.io >/dev/null 2>&1 || true; } && \
             docker image prune -f >/dev/null 2>&1 || true; docker compose ps"
