name: Env check (temporary)

# TEMPORARY read-only probe of the droplet's current config. Prints only
# NON-secret .env keys (CURSOR_API_KEY / ADMIN_PASSWORD are never read) plus
# the running container's effective workspace path. Remove after use.

on:
  push:
    branches: [claude/cicd-github-actions-2jwwar]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  envcheck:
    name: Inspect prod config (read-only)
    runs-on: ubuntu-latest
    steps:
      - name: Set up SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Inspect
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER || 'root' }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH || '/opt/chiatienan' }}
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=yes \
            "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "cd '${DEPLOY_PATH}' && \
             echo '--- .env (non-secret keys only) ---' && \
             grep -E '^(CURSOR_SDK_WORKSPACE|CURSOR_SDK_MODEL|CURSOR_API_BASE|CURSOR_AGENT_MAX_TOOLS|CURSOR_AGENT_MAX_SECONDS|BOT_HANDLE|DATABASE_URL|TZ|QR_BASE_URL|QR_TEMPLATE|CADDY_DOMAIN)=' .env || echo '(none matched)' && \
             echo '--- backend container: effective CURSOR_SDK_WORKSPACE ---' && \
             docker compose exec -T backend sh -c 'echo CURSOR_SDK_WORKSPACE=\$CURSOR_SDK_WORKSPACE' && \
             echo '--- does that workspace hold data in the container? ---' && \
             docker compose exec -T backend sh -c 'ls -la \"\$CURSOR_SDK_WORKSPACE\" 2>/dev/null | head -n 15 || echo \"(path does not exist)\"' && \
             echo '--- host: contents of the mounted ./data volume ---' && \
             ls -la ./data 2>/dev/null | head -n 20 || true"