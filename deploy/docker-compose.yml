# DigitalOcean droplet deploy: Caddy (auto-TLS) in front of the FastAPI backend,
# SQLite on a persistent named volume. Run from this directory with a sibling
# ../.env (copy of the repo .env.example, filled in).
#
#   docker compose --env-file ../.env up --build -d
#
services:
  backend:
    build: ../backend
    env_file: ../.env
    environment:
      # Absolute paths on the persistent volume — override whatever .env has so
      # the DB + bridge workspace always live on /data.
      DATABASE_URL: sqlite:////data/chiatienan.db
      CURSOR_SDK_WORKSPACE: /data/cursor-agent
    volumes:
      - data:/data
    expose:
      - "8000"
    restart: unless-stopped

  caddy:
    image: caddy:2
    depends_on:
      - backend
    env_file: ../.env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  data:
  caddy_data:
  caddy_config:
