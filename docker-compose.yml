services:
  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      CADDY_DOMAIN: ${CADDY_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend

  backend:
    # Deploys pull this prebuilt image from GHCR (IMAGE_TAG set by CI to the
    # commit SHA; defaults to :latest for manual/local use). `build:` stays so
    # local `docker compose build` / `up --build` still works offline.
    image: ghcr.io/emismith90/chiatienan-backend:${IMAGE_TAG:-latest}
    build: ./backend
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data:/data        # SQLite DB persists here (DATABASE_URL=sqlite:////data/chiatienan.db)
    expose:
      - "8000"              # internal only; Caddy terminates TLS and proxies in

  frontend:
    image: ghcr.io/emismith90/chiatienan-frontend:${IMAGE_TAG:-latest}
    build: ./frontend
    restart: unless-stopped
    expose: ["3000"]
    depends_on: [backend]

volumes:
  caddy_data:
  caddy_config:
